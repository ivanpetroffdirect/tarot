<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Таро Маминого Спокойствия</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <header class="app-header">
      <h1>Таро Маминого Спокойствия ✨</h1>
      <p class="subtitle">Слушай сердце, забудь про немытую посуду. Карты знают, что тебе нужно прямо сейчас.</p>
    </header>

    <main class="card-zone">
      <div class="card-container" id="tarotCard">
        <div class="card">
          <div class="card-face card-back">
            <img src="https://i.postimg.cc/ZqDN1FHv/photo-2026-05-29-20-44-48.jpg" alt="Мама отдыхает" class="card-img" id="cardBackImg">
          </div>
          <div class="card-face card-front">
            <div class="card-emoji" id="cardEmoji">🔮</div>
            <h2 class="card-title" id="cardTitle">Название карты</h2>
          </div>
        </div>
      </div>
    </main>

    <section class="prediction-zone" id="predictionZone">
      <div class="prediction-text" id="predictionText">
        Нажми на карту выше, чтобы получить своё бережное послание...
      </div>
      <button class="btn" id="actionBtn" style="display: none;">Получить новый совет</button>
    </section>

    <footer class="app-footer">
      Если вам нужна бережная помощь со сном малыша, подписывайтесь на канал <a href="https://t.me/sperva_pospi" target="_blank">@sperva_pospi</a>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
